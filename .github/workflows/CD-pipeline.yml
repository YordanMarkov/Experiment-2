name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "20"

    steps:
      - name: 1) Checkout repository
        uses: actions/checkout@v4

      - name: 2) Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: 3) Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: 4) Build client
        working-directory: ./client
        run: npm run build

      - name: 5) Placeholder tests
        run: echo "Tests here"

      - name: 6) Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: 7) Start local backend
        working-directory: ./server
        env:
          OPENAI_API_KEY: dummy-key-for-ci
        run: |
          node index.js > server.log 2>&1 &
          echo $! > server.pid

      - name: 8) Wait for backend
        run: sleep 5

      - name: 9) Health check backend
        run: curl --fail http://127.0.0.1:3001/health

      - name: 10) Show backend log on failure
        if: failure()
        working-directory: ./server
        run: cat server.log || true

      - name: 11) Stop backend
        if: always()
        working-directory: ./server
        run: kill $(cat server.pid) || true