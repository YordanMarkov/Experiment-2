name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  cd:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: 1) Trigger Vercel production deployment
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"